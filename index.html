<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapdrum Triage Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --border2: #3a3a48;
    --text: #f0f0f2;
    --text2: #9898a8;
    --text3: #5a5a6a;
    --accent: #7c6cfc;
    --accent2: #5a4de8;
    --red: #ff5757;
    --red-bg: #2a1515;
    --amber: #f5a623;
    --amber-bg: #2a1e0a;
    --green: #3ddc84;
    --green-bg: #0d2318;
    --blue: #4db8ff;
    --blue-bg: #0a1e2a;
    --gray-bg: #1e1e26;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOP BAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .stats-bar { display: flex; gap: 16px; }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .progress-ring { position: relative; width: 44px; height: 44px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring .ring-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--accent); }

  /* FILTERS */
  .filters { display: flex; align-items: center; gap: 6px; padding: 12px 24px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .filter-chip { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .add-card-btn { margin-left: auto; font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
  .add-card-btn:hover { background: var(--accent); color: #fff; }

  /* BOARD */
  .board { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; padding: 16px 24px 40px; min-height: calc(100vh - 160px); }
  .col { display: flex; flex-direction: column; gap: 0; }
  .col-head { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 10px; }
  .col-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); }
  .col-count { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); color: var(--text3); padding: 1px 7px; border-radius: 99px; }
  .col-body { display: flex; flex-direction: column; gap: 8px; flex: 1; background: var(--surface); border-radius: var(--radius); padding: 10px; min-height: 120px; }
  .col-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 24px 0; }

  /* CARD */
  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 12px; cursor: default; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-sec { font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.07em; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 6px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.35; }
  .badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .b-red { background: var(--red-bg); color: var(--red); }
  .b-amber { background: var(--amber-bg); color: var(--amber); }
  .b-green { background: var(--green-bg); color: var(--green); }
  .b-gray { background: var(--gray-bg); color: var(--text2); }
  .deadline { font-size: 10px; color: var(--red); font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .deadline::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .tasks { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
  .task-row { display: flex; align-items: flex-start; gap: 7px; }
  .cb { width: 13px; height: 13px; border: 1px solid var(--border2); border-radius: 3px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cb:hover { border-color: var(--accent); }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked::after { content: ''; display: block; width: 4px; height: 6px; border: 1.5px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); margin-top: -1px; }
  .task-txt { font-size: 11px; color: var(--text2); line-height: 1.45; }
  .task-txt.done { color: var(--text3); text-decoration: line-through; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--border); }
  .owner-tag { font-size: 10px; color: var(--text3); }
  .move-btns { display: flex; gap: 4px; }
  .mv { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.12s; }
  .mv:hover { border-color: var(--accent); color: var(--accent); }
  .progress-bar-wrap { margin-top: 7px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }
  .progress-txt { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .card-action-btn { font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; }
  .card-action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  select.form-input option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tasks-editor { display: flex; flex-direction: column; gap: 6px; }
  .task-edit-row { display: flex; gap: 6px; align-items: center; }
  .task-edit-row input { flex: 1; }
  .remove-task { font-size: 14px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0 4px; line-height: 1; }
  .remove-task:hover { color: var(--red); }
  .add-task-btn { font-size: 11px; color: var(--accent); background: none; border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; width: 100%; margin-top: 4px; }
  .add-task-btn:hover { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { font-size: 12px; padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .btn-save { font-size: 12px; padding: 7px 18px; border-radius: var(--radius-sm); border: 1px solid var(--accent); background: var(--accent); color: #fff; cursor: pointer; font-weight: 500; }
  .btn-delete { font-size: 12px; padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--red-bg); background: transparent; color: var(--red); cursor: pointer; margin-right: auto; }

  @media(max-width:900px){
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media(max-width:560px){
    .board { grid-template-columns: 1fr; padding: 12px; }
    .topbar, .filters { padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div> Snapdrum Triage</div>
  <div class="top-actions">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="s-todo">0</div><div class="stat-lbl">To do</div></div>
      <div class="stat"><div class="stat-val" id="s-inprogress">0</div><div class="stat-lbl">In prog</div></div>
      <div class="stat"><div class="stat-val" id="s-blocked">0</div><div class="stat-lbl">Blocked</div></div>
      <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Done</div></div>
    </div>
    <div class="progress-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="#2e2e38" stroke-width="3"/>
        <circle id="ring-circle" cx="22" cy="22" r="18" fill="none" stroke="#7c6cfc" stroke-width="3" stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="113"/>
      </svg>
      <div class="ring-val" id="ring-pct">0%</div>
    </div>
  </div>
</div>

<div class="filters">
  <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
  <button class="filter-chip" onclick="setFilter('Projects',this)">Projects</button>
  <button class="filter-chip" onclick="setFilter('Courses',this)">Courses</button>
  <button class="filter-chip" onclick="setFilter('Socials',this)">Socials</button>
  <button class="filter-chip" onclick="setFilter('Special',this)">Special</button>
  <button class="add-card-btn" onclick="openAddModal()">+ Add card</button>
</div>

<div class="board">
  <div class="col"><div class="col-head"><span class="col-label">To do</span><span class="col-count" id="cnt-todo">0</span></div><div class="col-body" id="col-todo"></div></div>
  <div class="col"><div class="col-head"><span class="col-label">In Progress</span><span class="col-count" id="cnt-inprogress">0</span></div><div class="col-body" id="col-inprogress"></div></div>
  <div class="col"><div class="col-head"><span class="col-label">Blocked</span><span class="col-count" id="cnt-blocked">0</span></div><div class="col-body" id="col-blocked"></div></div>
  <div class="col"><div class="col-head"><span class="col-label">Done</span><span class="col-count" id="cnt-done">0</span></div><div class="col-body" id="col-done"></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add card</h2>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="f-title" placeholder="Card title">
      </div>
      <div class="form-group">
        <label class="form-label">Section</label>
        <select class="form-input" id="f-section">
          <option value="Projects">Projects</option>
          <option value="Courses">Courses</option>
          <option value="Socials">Socials</option>
          <option value="Special">Special</option>
          <option value="Emails">Emails</option>
          <option value="Parking Lot">Parking Lot</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="f-priority">
          <option value="urgent">Urgent</option>
          <option value="thisweek">This week</option>
          <option value="planning">Planning</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="f-status">
          <option value="todo">To do</option>
          <option value="inprogress">In progress</option>
          <option value="blocked">Blocked</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input class="form-input" id="f-deadline" placeholder="e.g. 25 Mar">
      </div>
      <div class="form-group">
        <label class="form-label">Owner</label>
        <input class="form-input" id="f-owner" placeholder="e.g. Mario S.">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tasks</label>
      <div class="tasks-editor" id="tasks-editor"></div>
      <button class="add-task-btn" onclick="addTaskField()">+ Add task</button>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deleteCard()" style="display:none">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'snapdrum-triage-v2';
let activeFilter = 'all';
let editingId = null;

const DEFAULT_CARDS = [
  {id:1,title:'UN Project',section:'Projects',status:'todo',priority:'urgent',deadline:'25 Mar',owner:'',tasks:[{t:'Review & verify PATH User Guide v2',done:false},{t:'Final checklist w/ Mario S.',done:false},{t:'Request info/permissions from client',done:false}]},

  {id:5,title:'Law Firm Client',section:'Projects',status:'todo',priority:'thisweek',deadline:'',owner:'',tasks:[{t:'Follow up with client',done:false}]},
  {id:6,title:'PM Publishing',section:'Projects',status:'inprogress',priority:'planning',deadline:'',owner:'',tasks:[{t:'Get status update from team',done:false}]},
  {id:7,title:'Enterprise Analytics',section:'Projects',status:'inprogress',priority:'planning',deadline:'',owner:'',tasks:[{t:'Get scope reviewed by Aki',done:false}]},
  {id:8,title:'AI PM Bootcamp & Certificate',section:'Courses',status:'todo',priority:'urgent',deadline:'Today',owner:'',tasks:[{t:'Create & add free resources into course',done:false}]},
  {id:9,title:'Mini Certifications',section:'Courses',status:'todo',priority:'urgent',deadline:'EOD',owner:'',tasks:[{t:'Document 5 mini cert concepts',done:false}]},
  {id:10,title:'MPB – Evals Session',section:'Courses',status:'todo',priority:'urgent',deadline:'EOD',owner:'',tasks:[{t:'Complete Session 1 draft + glossary',done:false},{t:'Draft 1-page 3-session pathway outline',done:false}]},
  {id:11,title:'Maven – Drip Emails',section:'Courses',status:'todo',priority:'thisweek',deadline:'',owner:'Mario S.',tasks:[{t:'Improve drip/follow-up emails on Maven',done:false},{t:'Review what Hamel sent',done:false},{t:'Sign up to top 20 courses & track emails',done:false}]},
  {id:12,title:'AI for Lay People',section:'Courses',status:'inprogress',priority:'planning',deadline:'',owner:'',tasks:[{t:'Finalise name/branding',done:false},{t:'Find someone to deliver Python basics module',done:false}]},
  {id:13,title:'Substack – Posts',section:'Socials',status:'todo',priority:'urgent',deadline:'Thursday',owner:'',tasks:[{t:'Publish 25 posts today',done:false},{t:'Publish 20 posts tomorrow',done:false}]},
  {id:14,title:'Substack – Image Creation',section:'Socials',status:'blocked',priority:'urgent',deadline:'Thursday',owner:'',tasks:[{t:'Fix clean image creation via Nano Banana',done:false}]},
  {id:15,title:'Dean – Testimonial Call',section:'Socials',status:'todo',priority:'urgent',deadline:'Today 6PM',owner:'',tasks:[{t:'Join call with Dean to collect testimonial',done:false}]},
  {id:16,title:'Anthropic Event',section:'Socials',status:'todo',priority:'urgent',deadline:'Urgent',owner:'Mario for Aki',tasks:[{t:'Register for Anthropic SF event',done:false}]},
  {id:17,title:'LinkedIn – Jobs Post',section:'Socials',status:'todo',priority:'thisweek',deadline:'Friday',owner:'',tasks:[{t:'Curate 50 AI & ML job openings',done:false},{t:'Post on LinkedIn + Substack',done:false},{t:'Funnel readers to email list',done:false}]},
  {id:18,title:'LinkedIn – Account Strategy',section:'Socials',status:'todo',priority:'thisweek',deadline:'',owner:'',tasks:[{t:'Develop better warming strategy',done:false},{t:'Add AI Engineer event to content list',done:false}]},
  {id:19,title:'Email Signatures',section:'Socials',status:'todo',priority:'thisweek',deadline:'',owner:'Mario',tasks:[{t:'Create email signature for Aki',done:false}]},
  {id:20,title:'Mobile Editing Club – Workflows',section:'Special',status:'todo',priority:'planning',deadline:'',owner:'',tasks:[{t:'Find way to access their workflows',done:false}]},
  {id:21,title:'Mini Courses / TAI Webpage',section:'Special',status:'inprogress',priority:'thisweek',deadline:'',owner:'Aki',tasks:[{t:'Complete first draft',done:false}]},
  {id:22,title:'Project Delivery Process',section:'Special',status:'todo',priority:'thisweek',deadline:'',owner:'',tasks:[{t:'Develop robust delivery process',done:false},{t:'Goal: onboard more clients & projects',done:false}]},
  {id:23,title:'Website – Dynamic & Content',section:'Special',status:'inprogress',priority:'thisweek',deadline:'',owner:'',tasks:[{t:'Website dynamics section',done:true},{t:'Evals – pending',done:false},{t:'Speak to Ateeb re: content creation',done:false}]},
  {id:24,title:'Clay – Corporate Outreach',section:'Special',status:'todo',priority:'thisweek',deadline:'',owner:'Mario',tasks:[{t:'Finish learning Clay',done:false},{t:'Work on corporate client outreach',done:false}]},
  {id:25,title:'SL & South Asia Lead Gen',section:'Special',status:'todo',priority:'thisweek',deadline:'',owner:'',tasks:[{t:'Plan session targeting SL & South Asia',done:false},{t:'Tap into AIESEC, GDG, Rotaract',done:false},{t:'Strategy to patch Maven revenue loss',done:false}]}
];

function load(){
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : JSON.parse(JSON.stringify(DEFAULT_CARDS)); }
  catch(e){ return JSON.parse(JSON.stringify(DEFAULT_CARDS)); }
}
function save(cards){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }catch(e){} }

let CARDS = load();

function priorityBadge(p){
  if(p==='urgent') return '<span class="badge b-red">Urgent</span>';
  if(p==='thisweek') return '<span class="badge b-amber">This week</span>';
  return '<span class="badge b-gray">Planning</span>';
}

function colLabel(s){ return {todo:'To do',inprogress:'In progress',blocked:'Blocked',done:'Done'}[s]||s; }

function renderCard(card){
  const allT = card.tasks.length;
  const doneT = card.tasks.filter(t=>t.done).length;
  const pct = allT ? Math.round(doneT/allT*100) : 0;
  const cols = ['todo','inprogress','blocked','done'];
  const idx = cols.indexOf(card.status);
  const prev = idx>0 ? `<button class="mv" onclick="move(${card.id},-1)">&#8592; ${colLabel(cols[idx-1])}</button>` : '';
  const next = idx<3 ? `<button class="mv" onclick="move(${card.id},1)">${colLabel(cols[idx+1])} &#8594;</button>` : '';

  const tasksHtml = card.tasks.map((tk,ti)=>`
    <div class="task-row">
      <div class="cb ${tk.done?'checked':''}" onclick="toggleTask(${card.id},${ti})"></div>
      <span class="task-txt ${tk.done?'done':''}">${tk.t}</span>
    </div>`).join('');

  return `<div class="card" id="card-${card.id}">
    <div class="card-sec">${card.section}</div>
    <div class="card-top"><span class="card-title">${card.title}</span>${priorityBadge(card.priority)}</div>
    ${card.deadline?`<div class="deadline">${card.deadline}</div>`:''}
    ${card.tasks.length?`<div class="tasks">${tasksHtml}</div>`:''}
    ${allT?`<div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-txt">${doneT}/${allT} tasks</div></div>`:''}
    <div class="card-meta">
      <div class="move-btns">${prev}${next}</div>
      <button class="card-action-btn" onclick="openEditModal(${card.id})">Edit</button>
    </div>
    ${card.owner?`<div class="owner-tag" style="margin-top:5px">&#128100; ${card.owner}</div>`:''}
  </div>`;
}

function render(){
  const cols = ['todo','inprogress','blocked','done'];
  let totalTasks=0, doneTasks=0;
  cols.forEach(c=>{
    const cards = CARDS.filter(card=>card.status===c&&(activeFilter==='all'||card.section===activeFilter));
    const el = document.getElementById('col-'+c);
    el.innerHTML = cards.length ? cards.map(renderCard).join('') : '<div class="col-empty">Empty</div>';
    document.getElementById('cnt-'+c).textContent = cards.length;
    document.getElementById('s-'+c).textContent = cards.length;
    cards.forEach(card=>{ totalTasks+=card.tasks.length; doneTasks+=card.tasks.filter(t=>t.done).length; });
  });
  const pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  document.getElementById('ring-pct').textContent = pct+'%';
  const circ = 2*Math.PI*18;
  document.getElementById('ring-circle').setAttribute('stroke-dashoffset', circ - (pct/100)*circ);
  save(CARDS);
}

function toggleTask(cid,ti){
  const card = CARDS.find(c=>c.id===cid);
  if(card){ card.tasks[ti].done = !card.tasks[ti].done; render(); }
}

function move(cid,dir){
  const cols=['todo','inprogress','blocked','done'];
  const card=CARDS.find(c=>c.id===cid);
  if(!card) return;
  const idx=cols.indexOf(card.status)+dir;
  if(idx>=0&&idx<4){ card.status=cols[idx]; render(); }
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openAddModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='Add card';
  document.getElementById('f-title').value='';
  document.getElementById('f-section').value='Projects';
  document.getElementById('f-priority').value='thisweek';
  document.getElementById('f-status').value='todo';
  document.getElementById('f-deadline').value='';
  document.getElementById('f-owner').value='';
  document.getElementById('btn-delete').style.display='none';
  renderTaskFields([]);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(cid){
  const card=CARDS.find(c=>c.id===cid);
  if(!card) return;
  editingId=cid;
  document.getElementById('modal-title').textContent='Edit card';
  document.getElementById('f-title').value=card.title;
  document.getElementById('f-section').value=card.section;
  document.getElementById('f-priority').value=card.priority;
  document.getElementById('f-status').value=card.status;
  document.getElementById('f-deadline').value=card.deadline||'';
  document.getElementById('f-owner').value=card.owner||'';
  document.getElementById('btn-delete').style.display='block';
  renderTaskFields(card.tasks);
  document.getElementById('modal-overlay').classList.add('open');
}

function renderTaskFields(tasks){
  const ed=document.getElementById('tasks-editor');
  ed.innerHTML='';
  tasks.forEach((tk,i)=>{
    const row=document.createElement('div');
    row.className='task-edit-row';
    row.innerHTML=`<input class="form-input" value="${tk.t.replace(/"/g,'&quot;')}" placeholder="Task description"><button class="remove-task" onclick="removeTaskField(this)">&#215;</button>`;
    ed.appendChild(row);
  });
}

function addTaskField(){
  const ed=document.getElementById('tasks-editor');
  const row=document.createElement('div');
  row.className='task-edit-row';
  row.innerHTML=`<input class="form-input" placeholder="Task description"><button class="remove-task" onclick="removeTaskField(this)">&#215;</button>`;
  ed.appendChild(row);
  row.querySelector('input').focus();
}

function removeTaskField(btn){ btn.parentElement.remove(); }

function saveCard(){
  const title=document.getElementById('f-title').value.trim();
  if(!title) return;
  const taskInputs=[...document.getElementById('tasks-editor').querySelectorAll('input')];
  const tasks=taskInputs.map(inp=>({t:inp.value.trim(),done:false})).filter(tk=>tk.t);
  if(editingId){
    const card=CARDS.find(c=>c.id===editingId);
    if(card){
      const existingTasks=card.tasks;
      card.title=title;
      card.section=document.getElementById('f-section').value;
      card.priority=document.getElementById('f-priority').value;
      card.status=document.getElementById('f-status').value;
      card.deadline=document.getElementById('f-deadline').value;
      card.owner=document.getElementById('f-owner').value;
      card.tasks=tasks.map((tk,i)=>({t:tk.t,done:existingTasks[i]?existingTasks[i].done:false}));
    }
  } else {
    const newId=CARDS.length ? Math.max(...CARDS.map(c=>c.id))+1 : 1;
    CARDS.push({id:newId,title,section:document.getElementById('f-section').value,priority:document.getElementById('f-priority').value,status:document.getElementById('f-status').value,deadline:document.getElementById('f-deadline').value,owner:document.getElementById('f-owner').value,tasks});
  }
  closeModal(); render();
}

function deleteCard(){
  if(!editingId) return;
  CARDS=CARDS.filter(c=>c.id!==editingId);
  closeModal(); render();
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editingId=null; }

document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

render();
</script>
</body>
</html>
